<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GeoSpotter</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-bs-theme="light">

<div class="app-shell">
  <header class="app-header">
    <div class="d-flex align-items-center gap-3">
      <div class="app-title">
        <div class="fw-bold">GeoSpotter</div>
      </div>
    </div>
    <div class="d-flex align-items-center gap-2">
		      <button id="themeToggleBtn" type="button" class="btn btn-outline-secondary btn-sm icon-btn" title="Passa al tema scuro" aria-label="Passa al tema scuro">
		        <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
		          <path id="themeIconMoon" d="M21 14.5A8.5 8.5 0 0 1 9.5 3a6.8 6.8 0 1 0 11.5 11.5Z" fill="currentColor"/>
		          <path id="themeIconSun" class="d-none" d="M12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12Zm0-15v2m0 16v-2m9-7h-2M5 12H3m15.364-6.364-1.414 1.414M7.05 16.95l-1.414 1.414m0-11.314L7.05 7.05m9.9 9.9 1.414 1.414" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
		        </svg>
		      </button>
	    </div>
	  </header>

  <div class="app-body">
    <aside class="app-sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="btn-group btn-group-sm" role="group" aria-label="Modalità sidebar">
          <button id="sidebarModeFilters" type="button" class="btn btn-outline-secondary active">Filtri</button>
          <button id="sidebarModeHistory" type="button" class="btn btn-outline-secondary">Cronologia</button>
        </div>
      </div>

      <div id="filtersPane">
      <!-- FORM SEZIONE -->
      <div class="card shadow-sm mb-3" id="formCard">
        <div class="card-body p-3">
          <form id="searchForm" onsubmit="return false;">
            <div class="mb-3">
              <div class="d-flex align-items-center justify-content-between">
                <h6 class="mb-0">Area di ricerca</h6>
              </div>
              <div class="row g-2 mt-2">
                <div class="col-12">
                  <label class="form-label fw-bold d-block mb-1">Città</label>
                  <input
                    type="text"
                    class="form-control"
                    id="city"
                    placeholder="Es. Milano, Roma, Torino"
                    autocomplete="off">
                </div>
                <div class="col-12">
                  <label class="form-label fw-bold d-block mb-1">Raggio (m)</label>
                  <input
                    type="number"
                    class="form-control"
                    id="searchRadius"
                    value="50000"
                    min="1000"
                    step="1000">
                </div>
              </div>
            </div>

	            <div class="mb-3">
	              <div class="d-flex justify-content-between align-items-center mb-2">
	                <h6 class="mb-0">Catena di luoghi</h6>
	                <small class="text-muted">(min 1)</small>
	              </div>
	              <svg id="connectionsSvg" width="100%" height="0" style="position: absolute; pointer-events: none;"></svg>
	              <div id="categoriesContainer" style="position: relative; padding-top: 10px;"></div>
			              <div class="mt-2 d-flex flex-wrap gap-2">
			                <button type="button" class="btn btn-outline-secondary btn-sm icon-btn" onclick="addCategory()" title="Aggiungi luogo" aria-label="Aggiungi luogo">
			                  <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
			                    <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
			                  </svg>
			                </button>
			                <button type="button" class="btn btn-outline-secondary btn-sm icon-btn" onclick="addLink()" title="Aggiungi collegamento" aria-label="Aggiungi collegamento">
			                  <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
			                    <path d="M10 7H8a5 5 0 0 0 0 10h2M14 7h2a5 5 0 0 1 0 10h-2M9 12h6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
			                  </svg>
			                </button>
			              </div>
		            </div>

            <button id="goBtn" class="btn btn-primary w-100 fw-bold">
              Avvia ricerca
            </button>
          </form>
        </div>
      </div>

      <!-- RISULTATI -->
      <div id="resultSection" class="d-none animate-fade-in">
        <div class="alert alert-success shadow-sm mb-3" style="border-radius: 12px;">
          <div class="d-flex align-items-start justify-content-between gap-2">
            <div>
              <div class="fw-bold">Risultati</div>
              <div class="mt-1" id="resultSummary">
                Trovate <strong id="pairCount">0</strong> connessioni a <strong id="resultCity">città</strong>
              </div>
              <div class="text-muted small mt-1" id="resultDetails"></div>
            </div>
            <button class="btn btn-outline-secondary btn-sm" onclick="resetForm()" title="Modifica filtri">✎</button>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary w-25" id="exportPdfBtn" type="button">PDF</button>
          <button class="btn btn-primary w-75" onclick="newSearch()">Nuova</button>
        </div>

        <div class="mt-3">
          <div class="results-list" id="resultsList"></div>
        </div>
      </div>

      <!-- ERRORE -->
      <div id="errorAlert" class="alert alert-danger d-none mt-2" role="alert" style="border-radius: 12px;">
        <div class="fw-bold">Errore</div>
        <p id="errorText" class="mb-2"></p>
        <button class="btn btn-sm btn-outline-danger" onclick="resetForm()">Riprova</button>
      </div>
      </div>

      <div id="historyPane" class="d-none">
        <div class="card shadow-sm mb-3">
          <div class="card-body p-3">
            <div class="d-flex align-items-center justify-content-between">
              <div class="fw-semibold">Cronologia ricerche</div>
              <button id="clearHistoryBtn" type="button" class="btn btn-outline-secondary btn-sm">Svuota</button>
            </div>
            <div class="text-muted small mt-2">Clicca una ricerca per ricaricare i filtri.</div>
          </div>
        </div>
        <div class="results-list" id="historyList"></div>
      </div>
	    </aside>
	
		    <div id="sidebarHandle" class="sidebar-handle" title="Trascina per ridimensionare">
		      <button id="sidebarToggleBtn" class="sidebar-toggle" type="button" title="Nascondi pannello" aria-label="Nascondi pannello">
		        <svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
		          <path d="M14.5 5.5L8.5 12l6 6.5" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
		        </svg>
		      </button>
		    </div>
	
	    <main class="app-main">
	      <div class="map-wrap" id="mapWrap">
	        <div id="map"></div>
	
	        <div class="map-overlay d-none" id="mapProgressOverlay">
	          <div class="map-overlay-card">
	            <div class="d-flex align-items-center justify-content-between">
              <div class="fw-semibold" id="statusTextOverlay">Ricerca in corso…</div>
              <div class="text-muted small" id="progressPctOverlay">0%</div>
            </div>
            <div class="progress mt-2" style="height: 10px;">
              <div id="progressBarOverlay" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;"> </div>
            </div>
            <div class="mt-2 text-muted small">
              <span id="detailsTextOverlay"></span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <footer class="app-footer">
    GeoSpotter © <span id="footerYear"></span>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="{{ url_for('static', filename='main.js') }}"></script>

<!-- Datalist nascosto per le categorie -->
<datalist id="categoriesList">
  <!-- Popolarato da JS -->
</datalist>
</body>
</html>
